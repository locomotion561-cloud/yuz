<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasyal Paraşütçü - Başlat</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Buton Stili */
        #startButton {
            position: absolute; z-index: 100; padding: 20px 40px;
            font-size: 24px; cursor: pointer; border-radius: 10px;
            background: #28a745; color: white; border: none;
        }

        /* Kamera ve Oyun Ekranı */
        #outputCanvas { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; transform: scaleX(-1); 
        }
    </style>
</head>
<body>

    <button id="startButton">Oyunu Başlat</button>
    <video id="videoElement" style="display:none;" playsinline></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

        // Oyun Döngüsü
        faceMesh.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                // Kaşların orta noktası (70: Sol, 300: Sağ)
                const eyebrowY = (landmarks[70].y + landmarks[300].y) / 2;

                // Paraşütçüyü Çiz
                ctx.fillStyle = "#FFD700"; // Altın sarısı
                ctx.beginPath();
                ctx.arc(canvas.width / 2, eyebrowY * canvas.height, 30, 0, 2 * Math.PI);
                ctx.fill();
            }
        });

        // Başlat Butonu İşlevi
        startButton.addEventListener('click', async () => {
            startButton.style.display = 'none'; // Butonu kaldır
            
            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 640, height: 480
            });
            await camera.start();
        });
    </script>
</body>
</html>
