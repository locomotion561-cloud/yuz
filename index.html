<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>2. Basamak: Yüz Takibi</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #outputCanvas { position: absolute; transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #status { position: absolute; top: 20px; color: yellow; font-size: 20px; z-index: 10; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="status">Kamerayı başlat ve yüzünü göster...</div>
    <video id="video" style="display:none;" playsinline></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const video = document.getElementById('video');

        const faceMesh = new FaceMesh({locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

        faceMesh.onResults(results => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                status.innerText = "Yüz algılandı! Kaş noktaları takip ediliyor.";
                const landmarks = results.multiFaceLandmarks[0];
                
                // Kaş üstü noktalarını çizerek doğrula (70: sol, 300: sağ)
                [70, 300].forEach(index => {
                    const pt = landmarks[index];
                    ctx.fillStyle = "red";
                    ctx.beginPath();
                    ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 5, 0, 2 * Math.PI);
                    ctx.fill();
                });
            } else {
                status.innerText = "Yüz bulunamadı, kameraya yakınlaş.";
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await faceMesh.send({image: video}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
