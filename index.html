<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Fasyal Paraşütçü</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; }
        #outputCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    </style>
</head>
<body>
    <video id="videoElement" style="display:none;" playsinline></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const video = document.getElementById('videoElement');
            const canvas = document.getElementById('outputCanvas');
            const ctx = canvas.getContext('2d');

            const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

            faceMesh.onResults((results) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const landmarks = results.multiFaceLandmarks[0];
                    // Kaş kaldırma takibi
                    const eyebrowY = (landmarks[70].y + landmarks[300].y) / 2;
                    
                    ctx.fillStyle = "yellow";
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, eyebrowY * canvas.height, 20, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 640, height: 480
            });
            await camera.start();
        });
    </script>
</body>
</html>
