<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Basamak: Temiz Kamera</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #videoElement { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        #btn { position: absolute; padding: 20px 40px; font-size: 20px; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btn">Kamerayı Başlat</button>
    <video id="videoElement" autoplay playsinline></video>

    <script>
        const video = document.getElementById('videoElement');
        const btn = document.getElementById('btn');

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
                btn.style.display = 'none';
            } catch (err) {
                alert("Kamera hatası: " + err);
            }
        });
    </script>
</body>
</html>
