<!DOCTYPE html>
<html>
<head>
    <title>Fasyal Paraşütçü MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        #outputCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); }
        #videoElement { display: none; }
    </style>
</head>
<body>
    <video id="videoElement"></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        
        let eyebrowY = 0; // Kaşın anlık konumu

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

        faceMesh.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // 70: Sol kaş üstü, 300: Sağ kaş üstü
                    const leftEyebrow = landmarks[70];
                    const rightEyebrow = landmarks[300];
                    eyebrowY = (leftEyebrow.y + rightEyebrow.y) / 2;

                    // Paraşütçüyü Çiz (Kaşların hizasında)
                    ctx.fillStyle = "red";
                    ctx.beginPath();
                    // Y koordinatını ters çevirerek görselleştiriyoruz
                    ctx.arc(canvas.width / 2, eyebrowY * canvas.height, 20, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await faceMesh.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
