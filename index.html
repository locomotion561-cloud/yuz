<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>3. Basamak: Matematiksel Hesaplama - Düzeltilmiş</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #outputCanvas { position: absolute; transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: contain; }
        #status { position: absolute; top: 20px; color: yellow; font-size: 24px; z-index: 10; font-family: sans-serif; background: rgba(0,0,0,0.6); padding: 15px; }
        #startBtn { position: absolute; z-index: 20; padding: 20px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="startBtn">Kalibrasyonu Başlat</button>
    <div id="status">Sistemi başlat...</div>
    <video id="video" style="display:none;" playsinline></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');

        let neutralY = null; 
        let offset = 20; // Başlangıç gürültüsünü dengelemek için offset
        const eyebrowPoints = [70, 63, 105, 66, 107, 300, 296, 334, 293, 336];

        const faceMesh = new FaceMesh({locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

        faceMesh.onResults(results => {
            if (canvas.width !== results.image.width) {
                canvas.width = results.image.width;
                canvas.height = results.image.height;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                
                let totalY = 0;
                eyebrowPoints.forEach(i => totalY += landmarks[i].y);
                let currentY = totalY / eyebrowPoints.length;

                if (neutralY === null) neutralY = currentY;

                let movement = (neutralY - currentY) * 1000; 
                let rawPercentage = (movement * 5) - offset;
                let percentage = Math.max(0, Math.min(100, rawPercentage));

                status.innerText = `Kaş Kalkma Oranı: %${Math.round(percentage)}`;

                eyebrowPoints.forEach(i => {
                    ctx.fillStyle = "lime";
                    ctx.beginPath();
                    ctx.arc(landmarks[i].x * canvas.width, landmarks[i].y * canvas.height, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
        });

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            neutralY = null; 
            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: { ideal: 1280 }, height: { ideal: 720 }
            });
            await camera.start();
        });
    </script>
</body>
</html>
