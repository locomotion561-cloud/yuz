<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DEBUG MODU</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #333; color: white; text-align: center; font-family: sans-serif; }
        #log { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; z-index: 999; }
        #outputCanvas { width: 100vw; height: 100vh; transform: scaleX(-1); }
    </style>
</head>
<body>
    <div id="log">Hazırlanıyor...</div>
    <video id="input_video" style="display:none;"></video>
    <canvas id="outputCanvas"></canvas>

    <script>
        const log = document.getElementById('log');
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        log.innerText = "Yükleniyor...";

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.onResults((results) => {
            log.innerText = "Sistem aktif, kamera görüntüleniyor.";
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });

        camera.start().then(() => {
            log.innerText = "Kamera başlatıldı!";
        }).catch(err => {
            log.innerText = "HATA: Kamera başlatılamadı: " + err;
        });
    </script>
</body>
</html>
